[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "vite --host 0.0.0.0"
  targetPort = 5173
  port = 8888
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/create-audit"
  to = "/.netlify/functions/create-audit"
  status = 200
  force = true

[[redirects]]
  from = "/api/get-audit"
  to = "/.netlify/functions/get-audit"
  status = 200
  force = true

[[redirects]]
  from = "/api/ping"
  to = "/.netlify/functions/ping"
  status = 200
  force = true


[[redirects]]
  from = "/api/process-audit-background"
  to = "/.netlify/functions/process-audit-background"
  status = 200
  force = true

[[redirects]]
  from = "/audits/*"
  to = "/index.html"
  status = 200
