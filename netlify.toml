[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "vite --host 0.0.0.0"
  targetPort = 5173
  port = 8888
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/audits/*"
  to = "/index.html"
  status = 200
